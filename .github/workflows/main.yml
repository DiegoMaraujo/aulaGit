name: Pipeline de CI/CD - Meu Primeiro Robô

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verificacoes-basicas:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Baixando o código
      uses: actions/checkout@v4

    - name: 2. Configurando Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 3. Instalando dependências
      run: npm install || true

    - name: 4. Verificando arquivos
      run: |
        ls -la

    - name: 5. Executando aplicação
      run: node app.js

    - name: 6. Executando testes
      run: node teste.js

    - name: 7. Finalização
      run: echo "Pipeline finalizado!"